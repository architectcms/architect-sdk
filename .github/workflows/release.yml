name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for npm Trusted Publishing (+ automatic provenance)
      contents: write # changeset publish pushes git tags
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      # Trusted Publishing requires npm >= 11.5.1; ensure we're current.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      # Publishes any unpublished versions via OIDC Trusted Publishing.
      # No NPM_TOKEN needed; provenance is signed automatically.
      - run: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
